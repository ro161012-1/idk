# TeaVM Configuration for Mindustry

# Main class
mainClass = mindustry.teavm.TeaVMLauncher

# Target directory
targetDirectory = build/teavm

# Build settings
minify = true
debugInformationGenerated = false
optimizationLevel = full

# WebAssembly target
targetType = wasm

# WebAssembly features
wasm.optimizeForSize = true
wasm.generateNamesSection = false
wasm.threads = true
wasm.simd = true
wasm.exceptions = true

# Reflection configuration
reflection.enabled = true
reflection.include = mindustry.**,arc.**,mindustry.gen.**,mindustry.mod.**,mindustry.logic.**,arc.assets.**,arc.struct.**,arc.util.**,arc.graphics.**,arc.math.**,arc.files.**,arc.net.**,arc.audio.**

# Code splitting
splitting = true
splitThreshold = 100000

# Excluded classes (native-only)
excludedClasses = mindustry.desktop.**,mindustry.server.**,mindustry.android.**,mindustry.ios.**,mindustry.desktop.steam.**,mindustry.desktop.discord.**,arc.backend.sdl.**,arc.backend.lwjgl3.**,arc.backend.headless.**,arc.filedialogs.**,arc.profiling.**,arc.recorder.**,arc.tools.**,arc.annotations.**

# Resource copying
resources.include = assets/**,shaders/**

# Minification settings
minifier.removeUnusedCode = true
minifier.removeUnusedMethods = true
minifier.removeUnusedFields = true
minifier.renameVariables = true
minifier.renameFunctions = true

# Closure Compiler settings (for JS fallback)
closureCompiler.enabled = true
closureCompiler.compilationLevel = ADVANCED_OPTIMIZATIONS
closureCompiler.warningLevel = QUIET

# Source maps (for debugging)
debugInformationGenerated = ${teavmDebug:false}

# Module name
moduleName = mindustry

# HTML wrapper
htmlTemplate = src/main/web/index.html