# .github/workflows/build-teavm.yml
name: Build TeaVM Port

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'demo'
        type: choice
        options:
          - demo
          - production
          - development

env:
  GRADLE_OPTS: "-Xms2g -Xmx8g"
  JAVA_VERSION: "17"

jobs:
  # ============================================================
  # QUICK VALIDATION (Runs first, fast)
  # ============================================================
  validate:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Check project structure
        run: |
          echo "=== Root files ==="
          ls -la
          echo ""
          echo "=== TeaVM module ==="
          ls -la teaVM/
          echo ""
          echo "=== HTML module ==="
          ls -la html/
          echo ""
          echo "=== Core module ==="
          ls -la core/

      - name: Quick Gradle check
        run: |
          chmod +x gradlew
          ./gradlew :teaVM:dependencies --configuration compileClasspath --no-daemon 2>&1 | tail -20
        continue-on-error: true

      - name: Check TeaVM module exists in settings
        run: |
          grep "teaVM" settings.gradle && echo "✅ teaVM in settings.gradle" || echo "❌ teaVM missing from settings.gradle"

  # ============================================================
  # GWT DEMO BUILD (Only one that works reliably)
  # ============================================================
  gwt-demo:
    name: GWT Demo Build (Working)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Make scripts executable
        run: chmod +x build-demo.sh gradlew

      - name: Build GWT Demo (actually works)
        run: |
          export GRADLE_OPTS="-Xms1g -Xmx4g"
          ./gradlew :html:compileDemo --no-daemon -Dorg.gradle.jvmargs="${{ env.GRADLE_OPTS }}" 2>&1 | tee build-demo.log

      - name: Verify Demo Build
        run: |
          ls -la html/build/war-demo/
          test -f html/build/war-demo/mindustrydemo/index.html && echo "✅ Demo index.html exists" || (echo "❌ Build failed" && exit 1)

      - name: Upload GWT Demo Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindustry-gwt-demo
          path: html/build/war-demo/
          retention-days: 14

  # ============================================================
  # TEAVM PRODUCTION BUILD (Experimental - may fail)
  # ============================================================
  teavm-production:
    name: TeaVM Production Build (Experimental)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ 